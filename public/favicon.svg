<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="rjGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Subtly tinted dark background -->
  <rect width="512" height="512" rx="110" fill="#050505" />
  <rect width="512" height="512" rx="110" fill="url(#rjGrad)" opacity="0.1" />
  
  <!-- Glowing gradient border matching theme colors -->
  <rect x="36" y="36" width="440" height="440" rx="80" fill="transparent" stroke="url(#rjGrad)" stroke-width="28" filter="url(#glow)" />
  
  <!-- Bold typography for the initials -->
  <text x="50%" y="54%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="240" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="-4">RJ</text>
</svg>